name: clicord
dockerfile: ./Dockerfile
domain: clicord                 # served at clicord.<base-domain>

ports:
  - container: 8080            # axum HTTP + websocket; host port assigned by samoswallow

env:
  CLICORD_LISTEN: "0.0.0.0:8080"
  CLICORD_DB: "sqlite:///data/clicord.db"
  # No CLICORD_JWT_SECRET here on purpose — the secret must NOT live in the repo.
  # The server generates a random one on first boot and persists it in /data.
  # To override (e.g. once samoswallow's encrypted Secrets are available),
  # set CLICORD_JWT_SECRET as a Secret — it takes precedence over the persisted one.

resources:
  cpu: "0.5"
  memory: "256m"

healthcheck:
  path: /health

scale:
  # The presence/routing hub is in-memory, so keep a single instance for now.
  # Horizontal scaling will need a shared bus (e.g. Redis) first.
  default_instances: 1
